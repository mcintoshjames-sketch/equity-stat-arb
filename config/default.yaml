      - AAPL
      - MSFT
      - GOOG
      - META
      - NVDA
      - AMD
      - INTC
      - CRM
      - ADBE
      - ORCL
    financials:
      - JPM
      - BAC
      - GS
      - MS
      - WFC
      - C
      - BLK
      - SCHW
      - AXP
      - USB
    healthcare:
      - JNJ
