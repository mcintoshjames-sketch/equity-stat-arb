schwab:
  app_key: "YOUR_APP_KEY"
  app_secret: "YOUR_APP_SECRET"
  callback_url: "https://127.0.0.1"
  tokens_db: "~/.schwabdev/tokens.db"
  account_hash: null

universe:
  min_price: 10.0
  min_avg_volume: 500000
  sectors:
