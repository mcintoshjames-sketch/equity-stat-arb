schwab:
  # Override with real credentials in config/local.yaml (git-ignored)
  # or set SCHWAB_APP_KEY / SCHWAB_APP_SECRET env vars.
  # See SCHWAB_AUTH_SETUP.md for details.
  app_key: "YOUR_APP_KEY_HERE"
  app_secret: "YOUR_APP_SECRET_HERE"
  callback_url: "https://127.0.0.1"
  tokens_db: "~/.schwabdev/tokens.db"
  account_hash: null

universe:
  min_price: 10.0
  min_avg_volume: 1000000
  sectors:
    technology:
      - AAPL
      - MSFT
      - GOOG
      - META
      - NVDA
      - AMD
      - INTC
      - CRM
      - ADBE
      - ORCL
    financials:
      - JPM
      - BAC
      - GS
      - MS
      - WFC
      - C
      - BLK
      - SCHW
      - AXP
      - USB
    healthcare:
      - JNJ
      - UNH
      - PFE
      - ABBV
      - MRK
      - TMO
      - ABT
      - LLY
      - BMY
      - AMGN
    energy:
      - XOM
      - CVX
      - COP
      - SLB
      - EOG
      - PXD
      - MPC
      - VLO
      - PSX
      - OXY
    consumer_discretionary:
      - AMZN
      - TSLA
      - HD
      - MCD
      - NKE
      - SBUX
      - LOW
      - TJX
      - BKNG
      - CMG
    industrials:
      - CAT
      - DE
      - UNP
      - HON
      - UPS
      - BA
      - RTX
      - LMT
      - GE
      - MMM

discovery:
  formation_days: 252
  coint_pvalue: 0.05
  adf_pvalue: 0.05
  min_half_life_days: 5
  max_half_life_days: 30
  max_hurst: 0.5
  min_correlation: 0.78
  parallel_n_jobs: -1
  use_ols_fallback: true
  min_common_obs: 60

signal:
  entry_z: 2.0
  exit_z: 0.5
  stop_z: 4.0
  timeout_half_life_mult: 3.0
  slippage_multiplier: 0.5
  adaptive_vol: false
  adaptive_vol_window: 20

sizing:
  dollars_per_leg: 1500.0
  max_gross_per_pair: 3000.0

risk:
  max_pairs: 10
  max_gross_exposure: 25000.0
  max_sector_pct: 0.30
  max_drawdown_pct: 0.10
  min_edge_over_slippage: 500.0
  structural_break_window: 60
  structural_break_pvalue: 0.10
  max_entries_per_step: 3
  per_pair_pnl_stop: -200.0
  max_cohort_concentration: 5
  min_days_before_expiry: 5

# FMP (Financial Modeling Prep) — earnings blackout support
# Set FMP_API_KEY env var or uncomment below to enable.
# fmp:
#   api_key: "YOUR_FMP_API_KEY"
#   earnings_blackout_days: 3
#   cache_dir: "~/.stat_arb"

walk_forward:
  formation_days: 252
  trading_days: 63

database:
  url: "sqlite:///stat_arb.db"
  echo: false

logging:
  level: "INFO"
  json_format: true
  log_file: null

broker_mode: "paper"
